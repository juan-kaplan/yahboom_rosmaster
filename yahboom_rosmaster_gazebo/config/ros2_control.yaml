controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

mecanum_drive_controller:
  ros__parameters:
    use_stamped_vel: false

    base_frame_id: base_link
    odom_frame_id: odom
    publish_odom: true
    enable_odom_tf: true

    front_left_wheel_command_joint_name:  front_left_wheel_joint
    front_right_wheel_command_joint_name: front_right_wheel_joint
    rear_left_wheel_command_joint_name:   back_left_wheel_joint
    rear_right_wheel_command_joint_name:  back_right_wheel_joint

    front_left_wheel_state_joint_name:  front_left_wheel_joint
    front_right_wheel_state_joint_name: front_right_wheel_joint
    rear_left_wheel_state_joint_name:   back_left_wheel_joint
    rear_right_wheel_state_joint_name:  back_right_wheel_joint

    # Humble expects these under kinematics.*
    kinematics:
      wheels_radius: 0.0325
      sum_of_robot_center_projection_on_X_Y_axis: 0.1545   # 0.08 + 0.0745

    cmd_vel_timeout: 0.25

    linear:
      x:
        has_velocity_limits: true
        max_velocity: 1.0   # m/s
        min_velocity: -1.0
        has_acceleration_limits: true
        max_acceleration: 1.0
      y:
        has_velocity_limits: true
        max_velocity: 1.0   # m/s
        min_velocity: -1.0
        has_acceleration_limits: true
        max_acceleration: 1.0

    angular:
      z:
        has_velocity_limits: true
        max_velocity: 2.0
        has_acceleration_limits: true
        max_acceleration: 2.0


